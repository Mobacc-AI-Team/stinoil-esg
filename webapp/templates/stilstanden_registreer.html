{% extends 'base.html' %}
{% block title %}Stilstand registreren · Mobacc{% endblock %}
{% block content %}

<div class="page-head">
  <div>
    <div class="eyebrow">Productie</div>
    <h2>Stilstand registreren</h2>
    <p class="muted-text">Week {{ week }} / {{ jaar }}</p>
  </div>
  <a href="{{ url_for('stilstanden_dashboard') }}" class="btn-outline">← Overzicht</a>
</div>

{% if melding %}
<div class="melding melding-{{ melding.type }}">{{ melding.tekst }}</div>
{% endif %}

<div class="card narrow-shell">
  <form method="post" class="stilstand-form">

    <div class="form-row">
      <label>Lijn</label>
      <div class="lijn-knoppen">
        {% for l in [1,2,3,4] %}
        <label class="lijn-btn">
          <input type="radio" name="lijn" value="{{ l }}" {% if loop.first %}checked{% endif %} onchange="updateOrders(this.value)">
          <span>Lijn {{ l }}</span>
        </label>
        {% endfor %}
      </div>
    </div>

    <div class="form-row">
      <label for="order">Productieorder</label>
      <div style="display:flex;gap:8px;align-items:flex-start;flex-direction:column;">
        <select id="order_select" name="_order_sel" onchange="if(this.value)document.getElementById('order').value=this.value" style="width:100%">
          <option value="">-- Kies uit geïmporteerde orders --</option>
          {% for lijn_nr in [1,2,3,4] %}
          <optgroup label="Lijn {{ lijn_nr }}" id="og_{{ lijn_nr }}" {% if lijn_nr != 1 %}style="display:none"{% endif %}>
            {% for o in orders_per_lijn.get(lijn_nr, []) %}
            <option value="{{ o }}">{{ o }}</option>
            {% endfor %}
          </optgroup>
          {% endfor %}
        </select>
        <input type="text" id="order" name="order" placeholder="Of typ ordernummer handmatig" style="width:100%">
      </div>
    </div>

    <div class="form-row">
      <label for="minuten">Stilstandtijd (minuten)</label>
      <input type="number" id="minuten" name="minuten" min="1" max="999" placeholder="bijv. 25" required>
    </div>

    <div class="form-row">
      <label for="redencode">Oorzaak</label>
      <select id="redencode" name="redencode" required>
        <option value="">-- Selecteer oorzaak --</option>
        {% set ns = namespace(cat='') %}
        {% for r in redencodes %}
          {% set cur_cat = r.code[:1] + '000' %}
          {% if cur_cat != ns.cat %}
            {% if ns.cat %}</optgroup>{% endif %}
            <optgroup label="{{ r.code[:1] }}000 – {{ r.label.split(' ')[0] if r.code|length == 4 else '' }}">
            {% set ns.cat = cur_cat %}
          {% endif %}
          <option value="{{ r.code }}">{{ r.code }} – {{ r.label }}</option>
        {% endfor %}
        {% if redencodes %}</optgroup>{% endif %}
      </select>
    </div>

    <button type="submit" class="btn btn-full">Registreer stilstand</button>
  </form>
</div>

<script>
const orderData = {{ orders_per_lijn | tojson }};
function updateOrders(lijn) {
  const sel = document.getElementById('order_select');
  for (let i = 1; i <= 4; i++) {
    const og = document.getElementById('og_' + i);
    if (og) og.style.display = (String(i) === String(lijn)) ? '' : 'none';
  }
  sel.value = '';
  document.getElementById('order').value = '';
}
</script>

<style>
.page-head { display:flex; align-items:flex-start; justify-content:space-between; gap:16px; margin-bottom:24px; flex-wrap:wrap; }
.muted-text { color:var(--muted); margin:2px 0 0; font-size:.88rem; }
.stilstand-form { display:flex; flex-direction:column; gap:18px; }
.form-row { display:flex; flex-direction:column; gap:6px; }
.form-row label { font-weight:600; font-size:.88rem; }
.form-row input, .form-row select { padding:10px 12px; border:1px solid var(--line); border-radius:8px; font-size:.95rem; width:100%; }
.form-row input:focus, .form-row select:focus { outline:none; border-color:var(--brand); }
.lijn-knoppen { display:flex; gap:8px; }
.lijn-btn input { display:none; }
.lijn-btn span { display:block; padding:9px 20px; border:1px solid var(--line); border-radius:8px; cursor:pointer; font-size:.9rem; font-weight:600; transition:all .12s; }
.lijn-btn input:checked + span { background:var(--brand); color:#fff; border-color:var(--brand); }
.btn { background:var(--brand); color:#fff; padding:11px 20px; border:none; border-radius:8px; font-size:.95rem; font-weight:600; cursor:pointer; }
.btn:hover { background:var(--brand-hover); }
.btn-full { width:100%; }
.btn-outline { border:1px solid var(--line); color:var(--ink); padding:8px 14px; border-radius:8px; font-size:.85rem; text-decoration:none; }
.btn-outline:hover { background:var(--surface-soft); text-decoration:none; }
.melding { padding:12px 16px; border-radius:8px; margin-bottom:16px; font-size:.9rem; }
.melding-ok { background:#d4edda; color:#155724; border:1px solid #c3e6cb; }
.melding-error { background:#f8d7da; color:#721c24; border:1px solid #f5c6cb; }
</style>
{% endblock %}
