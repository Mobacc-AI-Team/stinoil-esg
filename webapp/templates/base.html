<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Compliance Control{% endblock %}</title>
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <div class="header-top">
          <a href="{{ url_for('dashboard') }}" class="header-brand">
            <img src="/logo.png" alt="Mobacc logo" class="site-logo">
            <div>
              <div class="header-eyebrow">Mobacc</div>
              <h1 class="site-title"><a href="{{ url_for('dashboard') }}">Compliance Control</a></h1>
              <p class="site-subtitle">Wetgeving bewaken · Vragen rubriceren · Uniform beantwoorden</p>
            </div>
          </a>
          <form method="get" action="{{ url_for('zoek') }}" class="header-search">
            <input type="text" name="q" placeholder="Zoek in alles…"
                   value="{{ request.args.get('q', '') }}"
                   autocomplete="off">
            <button type="submit" aria-label="Zoeken">
              <svg width="15" height="15" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
                <circle cx="8.5" cy="8.5" r="5.5"/><line x1="13" y1="13" x2="18" y2="18"/>
              </svg>
            </button>
          </form>
        </div>
        <nav class="main-nav">
          <a href="{{ url_for('wetgeving') }}">Wetgeving</a>
          <a href="{{ url_for('wetgeving_importeer') }}">Beheer</a>
          <a href="{{ url_for('nieuwe_casus') }}">Nieuwe vraag</a>
          <a href="{{ url_for('casussen') }}">Casussen</a>
          <a href="{{ url_for('review_dashboard') }}" class="nav-link {% if request.endpoint == 'review_dashboard' %}active{% endif %}">Review</a>
          <a href="{{ url_for('vragen_analyse') }}">Uniforme antwoorden</a>
          <a href="{{ url_for('dossier') }}" class="nav-link {% if request.endpoint == 'dossier' %}active{% endif %}">Dossiers</a>
          <a href="{{ url_for('tijdslijn') }}" class="nav-link {% if request.endpoint == 'tijdslijn' %}active{% endif %}">Tijdslijn</a>
          {% if current_user %}
          <a href="{{ url_for('logout') }}">Uitloggen</a>
          {% elif database_configured %}
          <a href="{{ url_for('login') }}">Inloggen</a>
          {% endif %}
        </nav>
      </div>
    </header>

    <main class="container page-shell">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
