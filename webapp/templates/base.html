<!doctype html>
<html lang="nl">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Compliance Control{% endblock %}</title>
    <link rel="stylesheet" href="/style.css">
  </head>
  <body>
    <header class="site-header">
      <div class="container">
        <div class="header-top">
          <div class="header-brand">
            <a href="{{ url_for('dashboard') }}"><img src="/logo.png" alt="Mobacc logo" class="site-logo"></a>
            <div>
              <div class="eyebrow">Mobacc</div>
              <h1 class="site-title"><a href="{{ url_for('dashboard') }}">Compliance Control</a></h1>
            </div>
          </div>
          <p class="site-subtitle">Wetgeving bewaken · Vragen rubriceren · Uniform beantwoorden</p>
        </div>
        <nav class="main-nav">
          <a href="{{ url_for('wetgeving') }}">Wetgeving</a>
          <a href="{{ url_for('wetgeving_upload') }}">Upload</a>
          <a href="{{ url_for('wetgeving_importeer') }}">Importeer</a>
          <a href="{{ url_for('nieuwe_casus') }}">Nieuwe vraag</a>
          <a href="{{ url_for('vragen_analyse') }}">Analyse</a>
          <a href="{{ url_for('casussen') }}">Casussen</a>
          <a href="{{ url_for('zoek') }}">Zoeken</a>
          {% if current_user %}
          <a href="{{ url_for('logout') }}">Uitloggen</a>
          {% elif database_configured %}
          <a href="{{ url_for('login') }}">Inloggen</a>
          {% endif %}
        </nav>
      </div>
    </header>

    <main class="container page-shell">
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
